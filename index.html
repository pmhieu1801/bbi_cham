    let quizData = allQuestions.sort(() => Math.random() - 0.5).slice(0, 50);
let currentIdx = 0;
let score = 0;
let answered = false; // Biến kiểm soát xem đã trả lời chưa

function renderQuestion() {
    answered = false; // Reset trạng thái
    const q = quizData[currentIdx];
    document.getElementById("question-text").innerText = `${currentIdx + 1}. ${q.q}`;
    const list = document.getElementById("options-list");
    list.innerHTML = "";
    
    // Ẩn nút Next/Submit cho đến khi chọn xong
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("submit-btn").style.display = "none";

    q.options.forEach((opt, i) => {
        let li = document.createElement("li");
        li.className = "option";
        li.innerText = opt;
        li.onclick = () => checkAnswer(i, li);
        list.appendChild(li);
    });
}

function checkAnswer(selectedIndex, li) {
    if (answered) return; // Nếu đã chọn rồi thì không cho chọn tiếp
    answered = true;

    const q = quizData[currentIdx];
    const options = document.querySelectorAll('.option');

    // Tô màu đáp án đúng (Xanh)
    options[q.answer].classList.add('correct');

    // Nếu chọn sai thì tô đỏ đáp án đã chọn
    if (selectedIndex !== q.answer) {
        li.classList.add('wrong');
    } else {
        score++;
    }

    // Vô hiệu hóa tất cả các option
    options.forEach(el => el.classList.add('disabled'));

    // Hiển thị nút Next hoặc Submit
    if (currentIdx < quizData.length - 1) {
        document.getElementById("next-btn").style.display = "block";
    } else {
        document.getElementById("submit-btn").style.display = "block";
    }
}

function nextQuestion() {
    currentIdx++;
    renderQuestion();
}

function showScore() {
    document.getElementById("quiz-box").style.display = "none";
    const resDiv = document.getElementById("result");
    resDiv.style.display = "block";
    const points = (score / quizData.length) * 10;
    
    let html = `Kết quả: <b>${points.toFixed(1)}/10 điểm</b><br>`;
    if(points >= 9) {
        html += `<br><span style="color: #34a853; font-weight:bold;">Em châm giỏi vcl, người đâu thưởng Koi Thé! 🥤</span>`;
    } else {
        html += `<br>Cố gắng lên nhé bbi châm IU IU IU! ❤️‍🔥 được 9Đ trở lên có bất ngờ`;
    }
    resDiv.innerHTML = html;
}

renderQuestion();
document.addEventListener('keydown', function(event) {
    const key = event.key;

    // Xử lý phím 1, 2, 3, 4 để chọn đáp án
    if (['1', '2', '3', '4'].includes(key)) {
        const index = parseInt(key) - 1;
        const options = document.querySelectorAll('.option');
        if (options[index]) {
            // Tự động kích hoạt hành động click vào đáp án
            options[index].click();
        }
    }

    // Xử lý phím Enter để chuyển câu hoặc nộp bài
    if (key === 'Enter') {
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');

        // Nếu nút "Câu tiếp theo" đang hiện
        if (nextBtn.style.display !== 'none') {
            nextQuestion();
        } 
        // Nếu nút "Nộp bài" đang hiện
        else if (submitBtn.style.display !== 'none') {
            showScore();
        }
    }
});
</script>
